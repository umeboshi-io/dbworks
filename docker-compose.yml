services:
  postgres:
    image: postgres:18.1-alpine
    environment:
      POSTGRES_USER: dbworks
      POSTGRES_PASSWORD: dbworks
      POSTGRES_DB: dbworks_dev
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: dbworks
      MYSQL_DATABASE: dbworks_dev
      MYSQL_USER: dbworks
      MYSQL_PASSWORD: dbworks
    ports:
      - "3306:3306"
    volumes:
      - mysqldata:/var/lib/mysql

volumes:
  pgdata:
  mysqldata:
